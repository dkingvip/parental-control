name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-child:
    name: Build Child App
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build ChildApp
      working-directory: ./ChildApp
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    
    - uses: actions/upload-artifact@v4
      with:
        name: ChildApp-debug
        path: ChildApp/app/build/outputs/apk/debug/app-debug.apk

  build-parent:
    name: Build Parent App
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build ParentApp
      working-directory: ./ParentApp
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    
    - uses: actions/upload-artifact@v4
      with:
        name: ParentApp-debug
        path: ParentApp/app/build/outputs/apk/debug/app-debug.apk
