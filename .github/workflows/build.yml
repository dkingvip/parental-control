name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build ChildApp
      working-directory: ./ChildApp
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Build ParentApp
      working-directory: ./ParentApp
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: apks
        path: |
          ChildApp/app/build/outputs/apk/debug/app-debug.apk
          ParentApp/app/build/outputs/apk/debug/app-debug.apk
